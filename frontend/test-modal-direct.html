<!DOCTYPE html>
<html>
<head>
  <style>
    /* Test modal structure */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial; background: #f0f0f0; padding: 20px; }

    /* Original structure (broken) */
    .old-modal {
      position: fixed;
      inset: 0;
      background-color: rgba(0, 0, 0, 0.4);
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    /* New structure (fixed) */
    .new-backdrop {
      position: fixed;
      inset: 0;
      background-color: rgba(0, 0, 0, 0.4);
      z-index: 40;
    }

    .new-container {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      pointer-events: none;
    }

    .modal-content {
      background: white;
      border-radius: 0.75rem;
      padding: 1.5rem;
      width: 100%;
      max-width: 28rem;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
      pointer-events: auto;
    }

    input, select, textarea {
      width: 100%;
      padding: 0.5rem;
      margin: 0.5rem 0;
      border: 1px solid #ccc;
      border-radius: 0.375rem;
    }

    button {
      padding: 0.5rem 1rem;
      margin: 0.5rem 0.25rem 0;
      cursor: pointer;
      border: 1px solid #ccc;
      border-radius: 0.375rem;
    }

    .test-section {
      background: white;
      padding: 1rem;
      margin: 1rem 0;
      border-radius: 0.5rem;
    }

    .button-group { margin-top: 1rem; }
  </style>
</head>
<body>
  <h1>Modal Structure Test</h1>

  <div class="test-section">
    <h2>Original Structure (BROKEN - grey on top)</h2>
    <button onclick="showOldModal()">Open Modal (Old)</button>
  </div>

  <div class="test-section">
    <h2>New Structure (FIXED - white on top)</h2>
    <button onclick="showNewModal()">Open Modal (New)</button>
  </div>

  <!-- Old modal structure -->
  <div id="old-modal" class="old-modal" style="display: none;" onclick="if(event.target === this) closeOldModal()">
    <div class="modal-content">
      <h3>Edit Representative (Old Structure)</h3>
      <label>Name:</label>
      <input type="text" value="John Doe" />
      <label>Party:</label>
      <input type="text" value="BJP" />
      <div class="button-group">
        <button onclick="closeOldModal()">Close</button>
      </div>
    </div>
  </div>

  <!-- New modal structure -->
  <div id="new-backdrop" class="new-backdrop" style="display: none;" onclick="closeNewModal()"></div>
  <div id="new-container" class="new-container" style="display: none;">
    <div class="modal-content" onclick="event.stopPropagation()">
      <h3>Edit Representative (New Structure)</h3>
      <label>Name:</label>
      <input type="text" value="John Doe" />
      <label>Party:</label>
      <input type="text" value="BJP" />
      <div class="button-group">
        <button onclick="closeNewModal()">Close</button>
      </div>
    </div>
  </div>

  <script>
    function showOldModal() {
      document.getElementById('old-modal').style.display = 'flex';
    }

    function closeOldModal() {
      document.getElementById('old-modal').style.display = 'none';
    }

    function showNewModal() {
      document.getElementById('new-backdrop').style.display = 'block';
      document.getElementById('new-container').style.display = 'flex';
    }

    function closeNewModal() {
      document.getElementById('new-backdrop').style.display = 'none';
      document.getElementById('new-container').style.display = 'none';
    }

    // Close modals on Escape key
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeOldModal();
        closeNewModal();
      }
    });
  </script>
</body>
</html>
